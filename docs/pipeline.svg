rray="2 5" opacity="0.5"/><text x="42" y="90" class="m" font-size="11" letter-spacing="0.06em" fill="#9db2c6">A · ENTRENAMIENTO (UNA SOLA VEZ, OFFLINE)</text><rect x="40" y="118" width="152" height="90" rx="6" fill="#131f2c" stroke="rgba(255,255,255,.20)" stroke-width="1.4"/><text x="53" y="141" class="t" font-size="13" font-weight="600" fill="#e7f2fb">Dataset</text><line x1="52" y1="150" x2="180" y2="150" stroke="rgba(255,255,255,.10)"/><text x="53" y="168" class="m" font-size="10.5" fill="#9db2c6">COSWARA+Virufy</text><text x="53" y="185" class="m" font-size="10.5" fill="#9db2c6">1357 toses</text><text x="53" y="202" class="m" font-size="10.5" fill="#9db2c6">89% neg/11% pos</text><line x1="192" y1="163.0" x2="226" y2="163.0" stroke="rgba(157,178,198,.55)" stroke-width="1.5" marker-end="url(#aMut)"/><rect x="226" y="118" width="152" height="90" rx="6" fill="#131f2c" stroke="rgba(255,255,255,.20)" stroke-width="1.4"/><text x="239" y="141" class="t" font-size="13" font-weight="600" fill="#e7f2fb">Limpieza</text><line x1="238" y1="150" x2="366" y2="150" stroke="rgba(255,255,255,.10)"/><text x="239" y="168" class="m" font-size="10.5" fill="#9db2c6">Postive-&gt;Positive</text><text x="239" y="185" class="m" font-size="10.5" fill="#9db2c6">dedup · mp3 ok</text><text x="239" y="202" class="m" font-size="10.5" fill="#9db2c6">descarta Unknown</text><line x1="378" y1="163.0" x2="412" y2="163.0" stroke="rgba(157,178,198,.55)" stroke-width="1.5" marker-end="url(#aMut)"/><rect x="412" y="118" width="152" height="90" rx="6" fill="#131f2c" stroke="rgba(255,255,255,.20)" stroke-width="1.4"/><text x="425" y="141" class="t" font-size="13" font-weight="600" fill="#e7f2fb">features.py</text><line x1="424" y1="150" x2="552" y2="150" stroke="rgba(255,255,255,.10)"/><text x="425" y="168" class="m" font-size="10.5" fill="#9db2c6">librosa 22050</text><text x="425" y="185" class="m" font-size="10.5" fill="#9db2c6">MFCC(20)+espec.</text><text x="425" y="202" class="m" font-size="10.5" fill="#9db2c6">media+std = 64</text><line x1="564" y1="163.0" x2="598" y2="163.0" stroke="rgba(157,178,198,.55)" stroke-width="1.5" marker-end="url(#aMut)"/><rect x="598" y="118" width="152" height="90" rx="6" fill="#131f2c" stroke="rgba(255,255,255,.20)" stroke-width="1.4"/><text x="611" y="141" class="t" font-size="13" font-weight="600" fill="#e7f2fb">features.csv</text><line x1="610" y1="150" x2="738" y2="150" stroke="rgba(255,255,255,.10)"/><text x="611" y="168" class="m" font-size="10.5" fill="#9db2c6">tabla 40 cols</text><text x="611" y="185" class="m" font-size="10.5" fill="#9db2c6">reproducible</text><text x="611" y="202" class="m" font-size="10.5" fill="#9db2c6">sin re-leer audio</text><line x1="750" y1="163.0" x2="784" y2="163.0" stroke="rgba(157,178,198,.55)" stroke-width="1.5" marker-end="url(#aMut)"/><rect x="784" y="118" width="152" height="90" rx="6" fill="#131f2c" stroke="rgba(255,255,255,.20)" stroke-width="1.4"/><text x="797" y="141" class="t" font-size="13" font-weight="600" fill="#e7f2fb">StandardScaler</text><line x1="796" y1="150" x2="924" y2="150" stroke="rgba(255,255,255,.10)"/><text x="797" y="168" class="m" font-size="10.5" fill="#9db2c6">.fit(X)</text><text x="797" y="185" class="m" font-size="10.5" fill="#9db2c6">media 0, var 1</text><text x="797" y="202" class="m" font-size="10.5" fill="#9db2c6">guarda mu/sigma</text><line x1="936" y1="163.0" x2="970" y2="163.0" stroke="rgba(157,178,198,.55)" stroke-width="1.5" marker-end="url(#aMut)"/><rect x="970" y="118" width="152" height="90" rx="6" fill="#131f2c" stroke="rgba(255,255,255,.20)" stroke-width="1.4"/><text x="983" y="141" class="t" font-size="13" font-weight="600" fill="#e7f2fb">SVC rbf C=10</text><line x1="982" y1="150" x2="1110" y2="150" stroke="rgba(255,255,255,.10)"/><text x="983" y="168" class="m" font-size="10.5" fill="#9db2c6">.fit(Xs,y)</text><text x="983" y="185" class="m" font-size="10.5" fill="#9db2c6">probability=True</text><text x="983" y="202" class="m" font-size="10.5" fill="#