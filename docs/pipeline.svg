="#bfeafd">POST /predict</text><line x1="238" y1="518" x2="366" y2="518" stroke="rgba(255,255,255,.10)"/><text x="239" y="536" class="m" font-size="10.5" fill="#9db2c6">audio+consent</text><text x="239" y="553" class="m" font-size="10.5" fill="#9db2c6">HTTPS</text><text x="239" y="570" class="m" font-size="10.5" fill="#9db2c6">-&gt; FastAPI</text><line x1="378" y1="531.0" x2="412" y2="531.0" stroke="#00bfff" stroke-width="1.7" marker-end="url(#aCy)"/><rect x="412" y="486" width="152" height="90" rx="6" fill="#17303f" stroke="#35c3f2" stroke-width="1.4"/><text x="425" y="509" class="t" font-size="13" font-weight="600" fill="#bfeafd">cargar()</text><line x1="424" y1="518" x2="552" y2="518" stroke="rgba(255,255,255,.10)"/><text x="425" y="536" class="m" font-size="10.5" fill="#9db2c6">librosa.load</text><text x="425" y="553" class="m" font-size="10.5" fill="#9db2c6">sr=22050</text><text x="425" y="570" class="m" font-size="10.5" fill="#9db2c6">-&gt; senal</text><line x1="564" y1="531.0" x2="598" y2="531.0" stroke="#00bfff" stroke-width="1.7" marker-end="url(#aCy)"/><rect x="598" y="486" width="152" height="90" rx="6" fill="#17303f" stroke="#35c3f2" stroke-width="1.4"/><text x="611" y="509" class="t" font-size="13" font-weight="600" fill="#bfeafd">Guarda silencio</text><line x1="610" y1="518" x2="738" y2="518" stroke="rgba(255,255,255,.10)"/><text x="611" y="536" class="m" font-size="10.5" fill="#9db2c6">pico&gt;=0.03 o</text><text x="611" y="553" class="m" font-size="10.5" fill="#9db2c6">pico&gt;=8x fondo</text><text x="611" y="570" class="m" font-size="10.5" fill="#9db2c6">sino: sin_tos</text><line x1="750" y1="531.0" x2="784" y2="531.0" stroke="#00bfff" stroke-width="1.7" marker-end="url(#aCy)"/><rect x="784" y="486" width="152" height="90" rx="6" fill="#17303f" stroke="#35c3f2" stroke-width="1.4"/><text x="797" y="509" class="t" font-size="13" font-weight="600" fill="#bfeafd">features_de_senal</text><line x1="796" y1="518" x2="924" y2="518" stroke="rgba(255,255,255,.10)"/><text x="797" y="536" class="m" font-size="10.5" fill="#9db2c6">MFCC+espec. 64</text><text x="797" y="553" class="m" font-size="10.5" fill="#9db2c6">MISMO codigo</text><text x="797" y="570" class="m" font-size="10.5" fill="#9db2c6">que en train</text><line x1="936" y1="531.0" x2="970" y2="531.0" stroke="#00bfff" stroke-width="1.7" marker-end="url(#aCy)"/><rect x="970" y="486" width="152" height="90" rx="6" fill="#17303f" stroke="#35c3f2" stroke-width="1.4"/><text x="983" y="509" class="t" font-size="13" font-weight="600" fill="#bfeafd">scaler.transform</text><line x1="982" y1="518" x2="1110" y2="518" stroke="rgba(255,255,255,.10)"/><text x="983" y="536" class="m" font-size="10.5" fill="#9db2c6">el MISMO</text><text x="983" y="553" class="m" font-size="10.5" fill="#9db2c6">scaler de train</text><text x="983" y="570" class="m" font-size="10.5" fill="#9db2c6">(mu/sigma)</text><line x1="1122" y1="531.0" x2="1156" y2="531.0" stroke="#00bfff" stroke-width="1.7" marker-end="url(#aCy)"/><rect x="1156" y="486" width="152" height="90" rx="6" fill="#17303f" stroke="#35c3f2" stroke-width="1.4"/><text x="1169" y="509" class="t" font-size="13" font-weight="600" fill="#bfeafd">predict_proba</text><line x1="1168" y1="518" x2="1296" y2="518" stroke="rgba(255,255,255,.10)"/><text x="1169" y="536" class="m" font-size="10.5" fill="#9db2c6">SVM -&gt; prob</text><text x="1169" y="553" class="m" font-size="10.5" fill="#9db2c6">banda de riesgo</text><text x="1169" y="570" class="m" font-size="10.5" fill="#9db2c6">-&gt; medidor</text><line x1="674.0" y1="576" x2="674.0" y2="616" stroke="rgba(157,178,198,.55)" stroke-width="1.4" marker-end="url(#aMut)"/><rect x="578.0" y="618" width="192" height="28" rx="6" fill="#162230" stroke="rgba(255,255,255,.20)"/><text x="674.0" y="636" text-anchor="middle" class="m" font-size="10.2" fill="#9db2c6">silencio -> "No detectamos una tos"</text><path d="M 1232.0 208 L 1232.0 372 L 1046.0 372 L 1046.0 486" fill="none" stroke="#f7c02e" stroke-width="2.4" marker-end="url(#aAm)" filter="url(#ag)"/><rect x="388" y="345" width="604" height="54" rx="8" fill="#162230" stroke="#f7c02e" stroke-width="1.4" filter="url(#ag)"/><text x="690.0" y="366" text-anchor="middle" class="t" font-size="13" font-weight="700" fill="#f7c02e">El modelo YA ENTRENADO se carga en memoria y califica cada tos</text><text x="690.0" y="387" text-anchor="middle" class="m" font-size="10.6" fill="#9db2c6">no se re-entrena en vivo · no hay numero al azar · la misma tos da el mismo %</text><line x1="26" y1="704" x2="48" y2="704" stroke="#00bfff" stroke-width="2"/><text x="54" y="708" class="m" font-size="10.5" fill="#9db2c6">flujo en vivo (cian)</text><line x1="230" y1="704" x2="252" y2="704" stroke="#f7c02e" stroke-width="2.4"/><text x="258" y="708" class="m" font-size="10.5" fill="#9db2c6">el modelo entrenado viaja (ambar)</text><line x1="560" y1="704" x2="582" y2="704" stroke="rgba(157,178,198,.55)" stroke-width="1.6"/><text x="588" y="708" class="m" font-size="10.5" fill="#9db2c6">paso offline</text></svg>