xt x="61" y="409" class="t" font-size="13" font-weight="600" fill="#bfeafd">Consentimiento (opcional)</text><line x1="60" y1="418" x2="326" y2="418" stroke="rgba(255,255,255,.10)"/><text x="61" y="436" class="m" font-size="10.5" fill="#9db2c6">checkbox -&gt; consent</text><text x="61" y="453" class="m" font-size="10.5" fill="#9db2c6">genero / edad si se aceptan</text><text x="60" y="500" class="m" font-size="10.2" fill="#6f8498">HTTPS · mismo origen (sin CORS)</text><rect x="488" y="138" width="332" height="150" rx="6" fill="#17303f" stroke="#35c3f2" stroke-width="1.4"/><text x="501" y="161" class="t" font-size="13" font-weight="600" fill="#bfeafd">Backend FastAPI · app.py</text><line x1="500" y1="170" x2="808" y2="170" stroke="rgba(255,255,255,.10)"/><text x="501" y="188" class="m" font-size="10.5" fill="#9db2c6">GET /health     POST /predict</text><text x="501" y="205" class="m" font-size="10.5" fill="#9db2c6">arranque(1 vez): joblib.load(</text><text x="501" y="222" class="m" font-size="10.5" fill="#9db2c6">  model, scaler) + meta.json</text><text x="501" y="239" class="m" font-size="10.5" fill="#9db2c6">precalienta librosa</text><text x="501" y="256" class="m" font-size="10.5" fill="#9db2c6">sirve la PWA (StaticFiles)</text><rect x="488" y="306" width="332" height="144" rx="6" fill="#131f2c" stroke="rgba(255,255,255,.20)" stroke-width="1.4"/><text x="501" y="329" class="t" font-size="13" font-weight="600" fill="#e7f2fb">Modelo entrenado (en memoria)</text><line x1="500" y1="338" x2="808" y2="338" stroke="rgba(255,255,255,.10)"/><text x="501" y="356" class="m" font-size="10.5" fill="#9db2c6">model.joblib  · SVM RBF C=10</text><text x="501" y="373" class="m" font-size="10.5" fill="#9db2c6">scaler.joblib · StandardScaler</text><text x="501" y="390" class="m" font-size="10.5" fill="#9db2c6">meta.json · clases {0,1}</text><text x="501" y="407" class="m" font-size="10.5" fill="#9db2c6">64 features (MFCC+espectral)</text><text x="501" y="424" class="m" font-size="10.5"